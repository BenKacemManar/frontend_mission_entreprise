<nav [class.shadow-nav]="scrolled"
     class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-ftn-border h-16 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3 no-underline group flex-shrink-0">
      <div class="relative w-9 h-9 rounded-xl flex items-center justify-center text-lg"
           style="background: linear-gradient(135deg, #EEF4FF, #DBEAFE); border: 1px solid rgba(0,87,255,.2)">
        🏊
      </div>
      <div class="flex flex-col leading-none">
        <span class="text-[16px] font-extrabold text-primary-dark tracking-tight group-hover:text-primary transition-colors duration-200">Athletix</span>
        <span class="text-[9px] font-bold tracking-[.2em] uppercase" style="color: #00C8F0">Governance</span>
      </div>
    </a>

    <!-- Desktop nav -->
    <ul class="hidden md:flex items-center gap-1 list-none m-0">
      <li *ngFor="let link of links">
        <a [routerLink]="link.path"
           [ngClass]="isActive(link.path)
             ? 'bg-primary text-white font-bold shadow-btn'
             : 'text-ftn-muted hover:text-primary-dark hover:bg-primary-light'"
           class="px-4 py-1.5 text-sm rounded-lg transition-all duration-200 no-underline font-medium flex items-center gap-1.5">
          <span class="text-xs opacity-80">{{ link.icon }}</span>
          {{ link.label }}
        </a>
      </li>
    </ul>

    <!-- Actions -->
    <div class="hidden md:flex items-center gap-2">
      <ng-container *ngIf="!currentUser; else loggedIn">
        <a routerLink="/auth/login"
           class="px-4 py-1.5 text-sm font-medium text-ftn-muted hover:text-primary-dark border border-ftn-border rounded-lg hover:bg-primary-light transition-all duration-200 no-underline">
          Connexion
        </a>
        <a routerLink="/auth/register"
           class="px-4 py-1.5 text-sm font-bold text-white bg-accent-red rounded-lg hover:opacity-90 transition-all duration-200 no-underline shadow-btn-red">
          Obtenir licence →
        </a>
      </ng-container>
      <ng-template #loggedIn>
        <div class="flex items-center gap-1.5 px-3 py-1.5 bg-primary-light rounded-lg border border-primary/20">
          <div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center text-xs text-white font-bold">
            {{ currentUser?.firstName?.charAt(0) }}
          </div>
          <span class="text-sm text-primary-dark font-medium">{{ currentUser?.firstName }}</span>
        </div>
        <a *ngIf="currentUser?.role === 'ADMIN'" routerLink="/admin"
           class="px-3 py-1.5 text-xs font-bold text-primary border border-primary/30 rounded-lg hover:bg-primary-light transition-all no-underline">
          ⚙ Admin
        </a>
        <button (click)="logout()"
                class="px-4 py-1.5 text-sm font-medium text-ftn-muted hover:text-primary-dark transition-colors cursor-pointer bg-transparent border-none">
          Déconnexion
        </button>
      </ng-template>
    </div>

    <!-- Hamburger -->
    <button class="md:hidden flex flex-col gap-[5px] p-2 bg-transparent border-none cursor-pointer"
            (click)="menuOpen = !menuOpen">
      <span class="block w-5 h-0.5 rounded-full transition-all duration-200"
            [class.bg-primary]="menuOpen" [class.bg-ftn-muted]="!menuOpen"
            [class.rotate-45]="menuOpen" [class.translate-y-[7px]]="menuOpen"></span>
      <span class="block w-5 h-0.5 rounded-full bg-ftn-border transition-all duration-200"
            [class.opacity-0]="menuOpen"></span>
      <span class="block w-5 h-0.5 rounded-full transition-all duration-200"
            [class.bg-primary]="menuOpen" [class.bg-ftn-muted]="!menuOpen"
            [class.-rotate-45]="menuOpen" [class.-translate-y-[7px]]="menuOpen"></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="menuOpen"
       class="md:hidden bg-white border-t border-ftn-border px-4 pt-3 pb-4 flex flex-col gap-1 animate-fade-in">
    <a *ngFor="let link of links" [routerLink]="link.path"
       [ngClass]="isActive(link.path) ? 'bg-primary-light text-primary font-semibold' : 'text-ftn-muted'"
       class="px-4 py-2.5 text-sm rounded-lg hover:bg-primary-light hover:text-primary no-underline transition-all flex items-center gap-2">
      <span>{{ link.icon }}</span>{{ link.label }}
    </a>
    <div class="border-t border-ftn-border mt-2 pt-3 flex flex-col gap-2">
      <ng-container *ngIf="!currentUser">
        <a routerLink="/auth/login" class="px-4 py-2.5 text-sm text-ftn-muted no-underline hover:text-primary">Connexion</a>
        <a routerLink="/auth/register"
           class="px-4 py-2.5 text-sm font-bold text-white bg-accent-red rounded-lg text-center no-underline shadow-btn-red">
          Obtenir ma licence →
        </a>
      </ng-container>
    </div>
  </div>
</nav>
